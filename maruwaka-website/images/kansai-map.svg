<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <defs>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="350" fill="#e3f2fd" rx="16"/>
  
  <!-- 日本地図（簡略化） -->
  <path d="M50,50 Q80,30 120,40 L150,35 Q180,45 200,60 L230,55 Q260,50 290,70 L320,85 Q340,100 350,130 L355,160 Q350,190 340,220 L320,250 Q290,280 250,290 L200,295 Q150,290 120,270 L90,240 Q60,200 55,160 L50,120 Q45,80 50,50 Z" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  
  <!-- 関西エリア（ハイライト） -->
  <ellipse cx="180" cy="200" rx="70" ry="55" fill="url(#mapGrad)" stroke="#1a5336" stroke-width="3"/>
  
  <!-- 大阪 -->
  <circle cx="200" cy="200" r="12" fill="#1a5336"/>
  <text x="200" y="225" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a5336">大阪</text>
  
  <!-- 京都 -->
  <circle cx="180" cy="160" r="10" fill="#e85a2c"/>
  <text x="180" y="150" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e85a2c">京都</text>
  
  <!-- 神戸 -->
  <circle cx="140" cy="210" r="10" fill="#e85a2c"/>
  <text x="140" y="235" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e85a2c">神戸</text>
  
  <!-- 配送エリアラベル -->
  <rect x="100" y="280" width="200" height="40" rx="8" fill="#1a5336"/>
  <text x="200" y="305" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">配送対応エリア</text>
  
  <!-- トラックアイコン -->
  <g transform="translate(240, 175)">
    <rect x="0" y="10" width="30" height="18" rx="2" fill="#e85a2c"/>
    <rect x="22" y="5" width="15" height="23" rx="2" fill="#e85a2c"/>
    <circle cx="8" cy="30" r="5" fill="#333"/>
    <circle cx="30" cy="30" r="5" fill="#333"/>
  </g>
</svg>
